# -*-mode:toml-*- vim:ft=toml

[packages.homebrew]

tap = [
    'homebrew/core',
    'homebrew/cask',
    'homebrew/bundle',
    'homebrew/cask-fonts',
    'homebrew/cask-versions',
    'nicoverbruggen/homebrew-cask',
    'jesseduffield/lazygit',
    'ferdium/ferdium'
]

brew = [
    # Cli
    'gnupg',
    'lazygit',
    'neofetch',
    'direnv',
    'ranger',
    'duf',
    'bat',
    'git-delta',
    'eza',
    'hey', # Like a ab (ApacheBench)
    'yazi',
    'fd',
    'mpv',
    'zoxide',
    'age',

    # DEVOPS
    'lazydocker',
    'distrobox',
    'ducker',
    'podman',   
    'podman-compose',
    'podman-tui',
    'podlet',
    'lazyjournal',
    'k9s',

    # Mac App Store manager
    'mas' 
]

cask = [
    # App
    'ente-auth',
    'bitwarden',
    'macs-fan-control',
    'spotify',
    'appcleaner',
    'microsoft-teams',
    'notion',
    'dbeaver-community',
    'transmission',
    'vlc',
    'stack-stack',
    'keepingyouawake',
    'appcleaner',
    'figma',
    'rectangle',
    'zoom',
    'signal',
    'drawio',
    'obsidian',
    'localsend',
    'streamlink-twitch-gui',

    # terminal
    'kitty',
    'ghostty',
    'wezterm',
    
    # Ide
    'antigravity',
    'intellij-idea-ce',
    'visual-studio-code',
    'visual-studio-code@insiders',
    'vscodium',
    'vscodium@insiders',
    'cursor',

    # BROWSERS    
    'chromium',
    'brave-browser-nightly',
    'google-chrome-beta',
    'firefox-beta',

    # environment
    'github@beta',
    'podman-desktop',
    'openlens',
    'devpod'
]


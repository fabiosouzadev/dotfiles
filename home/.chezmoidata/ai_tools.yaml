ai_tools:
  npm:
    - name: opencode
      package: "opencode-ai"
      feature_flag: coding_assistants
      completions_cmd: "opencode completion"
    - name: copilot
      package: "@github/copilot@prerelease"
      feature_flag: coding_assistants
    - name: qwen-code
      package: "@qwen-code/qwen-code"
      feature_flag: coding_assistants
    - name: kilocode
      package: "@kilocode/cli"
      feature_flag: coding_assistants
    - name: amp
      package: "@sourcegraph/amp@latest"
      feature_flag: coding_assistants
    - name: codex
      package: "@openai/codex@latest"
      feature_flag: coding_assistants
      completions_cmd: "codex completion zsh"
    - name: gemini
      package: "@google/gemini-cli@preview"
      feature_flag: coding_assistants
    - name: openclaude
      package: "@gitlawb/openclaude@latest"
      feature_flag: coding_assistants
    - name: freebuff
      package: "freebuff"
      feature_flag: coding_assistants
    - name: openclaw
      package: "openclaw@beta"
      feature_flag: openclaw.install
    - name: openspec
      package: "@fission-ai/openspec@latest"
      feature_flag: spec_tools
      env: "OPENSPEC_NO_COMPLETIONS=1"
      completions_cmd: "openspec completion generate zsh"
    - name: gsd-core
      package: "@opengsd/gsd-core@latest --force --all --global"
      feature_flag: spec_tools
  curl:
    - name: aider
      url: "https://aider.chat/install.sh"
      shell: sh
      env: "NO_MODIFY_PATH=1"
      feature_flag: coding_assistants
    - name: claude
      url: "https://claude.ai/install.sh"
      shell: bash
      feature_flag: coding_assistants
    - name: kiro
      url: "https://cli.kiro.dev/install"
      shell: bash
      feature_flag: coding_assistants
    - name: bobibm
      url: "https://bob.ibm.com/download/bobshell.sh"
      shell: bash
      feature_flag: coding_assistants
      block_on_workplace: Zup
    - name: kimchi
      url: "https://github.com/getkimchi/kimchi/releases/latest/download/install.sh"
      shell: bash
      feature_flag: coding_assistants
    - name: hermes
      url: "https://hermes-agent.nousresearch.com/install.sh"
      shell: bash
      feature_flag: hermes.install
    - name: beads
      url: "https://raw.githubusercontent.com/gastownhall/beads/main/scripts/install.sh"
      shell: bash
      feature_flag: spec_tools
    - name: herdr
      url: "https://herdr.dev/install.sh"
      shell: sh
      feature_flag: multiplexer

# Configuração Chezmoi para VPS (Oracle Cloud Free Tier)
# Copie este conteúdo para ~/.config/chezmoi/chezmoi.yaml no VPS

data:
  # === DIRETÓRIOS ===
  dirs:
    bin: "/home/ubuntu/.local/bin"
    local: "/home/ubuntu/.local"
    src: "/home/ubuntu/.local/src"
    workspaces:
      prefix: "/home/ubuntu"

  # === FEATURES ===
  features:
    # AI Tools - apenas o necessário para VPS
    ai:
      coding_assistants: false      # Não precisa de assistentes de código no VPS
      gsd: false                    # Não precisa de GSD no VPS
      hermes:
        install: true               # Hermes Agent - ESSENCIAL
      ollama:
        install: false              # Não precisa de Ollama no VPS (sem GPU)
        localmodels: false
        mode: "user"
      omniroute:
        install: true               # OmniRoute - ESSENCIAL
        mode: "vps-server"          # Modo servidor VPS
        domain: ""                  # Configurar com seu domínio (ex: "omniroute.seudominio.com")
      openclaw:
        install: false              # Não precisa de OpenClaw
      spec_tools: false             # Não precisa de spec tools

    # Window Managers - DESABILITADO para VPS
    i3:
      enabled: false
    niri:
      enabled: false

    # Kernel - DESABILITADO para VPS
    kernels:
      install: false

    # Repos pessoais - HABILITADO se quer clonar repos
    personal_repos: true

    # Driver WiFi - DESABILITADO para VPS (sem WiFi)
    rtl8821ce:
      install: false

    # Runtime
    runtime:
      background_services: true     # Serviços em background

    # Systemd - HABILITADO para VPS
    systemd:
      enabled: true

  # === CONFIGURAÇÕES DO SISTEMA ===
  settings:
    ci: false
    codespaces: false
    dell3520: false
    dell3530: false
    devContainer: false
    ephemeral: false
    gitpod: false
    guiAvailable: false             # VPS não tem GUI
    headless: true                  # VPS é headless
    hostname: "vps-oracle"          # Hostname do VPS
    inContainer: false
    interactive: true
    ismanaged: false
    linuxonmac: false
    osid: "linux"                   # Linux, não darwin
    profile: "personal"
    replit: false
    ssh: true                       # VPS usa SSH
    termux: false
    tty: true
    username: "ubuntu"              # Usuário padrão do VPS Oracle
    vps: true                       # MARCA COMO VPS - ESSENCIAL
    workplace: "none"
    wsl: false
